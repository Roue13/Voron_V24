[include mainsail.cfg]
[include MACROS/Printing.cfg]
[include MACROS/Filament.cfg]
[include MACROS/Other.cfg]
[include KAMP_Settings.cfg]

#####################################################################
##                   Model and Acceleration
#####################################################################

[printer]
kinematics: corexy                       # Printer type: corexy.
max_velocity: 800                        # Maximum speed
max_accel: 20000                         # Maximum acceleration
max_z_velocity: 25                       # Z-axis maximum speed
max_z_accel: 300                         # Z-axis maximum acceleration
square_corner_velocity: 5.0              # Square corner velocity

[exclude_object]

[force_move]
enable_force_move: true

[skew_correction]
[skew_correction CaliFlower]
xy_skew = 0.00040371788902144473
xz_skew = 0.0
yz_skew = 0.0

#####################################################################
##                      MCU EBB36
#####################################################################

# This file contains common pin mappings for the BIGTREETECH EBB36
# GEN2 board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)" .
# The "EBB36 GEN2" micro-controller will be used to control the components on the nozzle.
[mcu EBB36]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_29000B000450315741363420-if00

# [lis2dw]
# cs_pin: EBB:PB1
# spi_bus:spi2_PB2_PB11_PB10
# axes_map: x,y,z

#####################################################################
##                     cartographer V3 (ADXL 345)
#####################################################################
[mcu scanner]
canbus_uuid: a439ee4536d4   #   Fill in the UUID that was just recorded           

[scanner]
mcu: scanner
x_offset: 0                          
#    adjust for your cartographers offset from nozzle to middle of coil
y_offset: 28                         
#    adjust for your cartographers offset from nozzle to middle of coil
backlash_comp: 0.007
#   Backlash compensation distance for removing Z backlash before measuring
#   the sensor response.
# 
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
# calibration_method: touch
#    leave this as touch unless you want to use scan only for everything. 
sensor: cartographer
#    this must be set as cartographer unless using IDM etc.
sensor_alt: carto
#    alternate name to call commands. CARTO_TOUCH etc
#scanner_touch_z_offset: 0.08      
#    This is the default and will be overwritten and added to the DO NOT SAVE area by using UI to save z offset
mesh_runs: 2
#    Number of passes to make during mesh scan.

# [adxl345]
# cs_pin: scanner:PA3
# spi_bus: spi1

[resonance_tester]
accel_chip: adxl345             # Specifies ADXL345 accelerometer for resonance testing
probe_points:
    175, 175, 20                # Coordinates of the probe points for resonance testing

[input_shaper]
shaper_freq_x: 53.8
shaper_type_x: mzv
damping_ratio_x: 0.042
shaper_freq_y: 38.4
shaper_type_y: mzv 
damping_ratio_y: 0.066

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 5
max_freq: 200
dpi: 300


#####################################################################
# 	                   Bed Grid Calibration
#####################################################################

[bed_mesh]
zero_reference_position: 175,175  
#    This option is suitable for the 350 model. 
#    set this to the middle of your bed
speed: 400
#    movement speed of toolhead during bed mesh
horizontal_move_z: 3
#    height of scanner during bed mesh scan
mesh_min: 30, 30
#    start point of bed mesh [X, Y]
mesh_max: 320, 320
#    end point of bed mesh [X, Y]
probe_count: 13, 13
algorithm: bicubic


####################################################################################
##                          Gantry Leveling Settings
####################################################################################
[quad_gantry_level]
gantry_corners:                          # Coordinates for the gantry corners
	-60,-10
	410,420
points:
	50,25
	50,275
	300,275
	300,25
speed: 500                               # Levelling speed in mm/min
horizontal_move_z: 5                     # Z-axis height for horizontal moves
retries: 10                              # Number of retries for out-of-tolerance adjustments
retry_tolerance: 0.005                   # Tolerance for retrying
max_adjust: 10                           # Maximum adjustment stroke for leveling

#-------------------------------------------------------------------

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR                       # Clear bed mesh data
    G28                                  # Home all axes
    QUAD_GANTRY_LEVEL                    # Perform gantry leveling
    G28                                  # Home all axes again
    G0 X175 Y175 Z30 F3600               # Move to a position (adjust for 300mm or 350mm models)
    
#--------------------------------------------------------------------


[safe_z_home]
home_xy_position: 175,175                # Example home_xy_position: 175,175 - This would be for a 350 * 350mm bed. 
z_hop: 10                                # Z axis hop height after homing.
speed: 200

#####################################################################
##                      MCU Octopus
#####################################################################

[mcu]
canbus_uuid: 8350a10ba3eb                # CAN bus unique identifier for Octopus MCU.
canbus_interface: can0                   # CAN bus interface.

#####################################################################
##                  Temperature Monitoring
#####################################################################

[temperature_sensor EBB36]
sensor_type: Generic 3950
sensor_pin: EBB36:PA0
pullup_resistor: 2200


[temperature_sensor MCU_Octupus_-_Pro]
sensor_type: temperature_mcu             # MCU internal temperature sensor.

[temperature_sensor MCU_-_RPi]
sensor_type: temperature_host            # Host system internal temperature sensor.

[temperature_sensor MCU_-_Cartographer]
sensor_type: temperature_mcu
sensor_mcu: scanner
min_temp: 0
max_temp: 105

#####################################################################
#                        B(X) ---------A(Y)
#                        |                |
#                        |                |
#                        |--------E-------|
#                        |                |
#                        |                |
#                        |                |
#####################################################################
##                   X-axis on MOTOR_0(B Motor)
#####################################################################
[tmc2240 stepper_x]
cs_pin: PC4                              # Chip select pin for TMC2240 driver
spi_software_sclk_pin: PA5               # SPI software clock pin
spi_software_mosi_pin: PA7               # SPI software MOSI pin
spi_software_miso_pin: PA6               # SPI software MISO pin
driver_TPFD: 0                           # TMC2240 TPFD setting
run_current: 1.2                         # Motor running current value (A)
diag1_pin: ^!PG6
driver_SGT: -64                          # 255 is most sensitive value, 0 is least sensitive

[stepper_x]
step_pin: PF13                           # X-axis motor pulse pin setting
dir_pin: PF12                           # X-axis motor direction pin setting
enable_pin: !PF14                        # X-axis motor enable pin setting
microsteps: 32                           # Motor microsteps setting
rotation_distance: 40                    # Active pulley circumference in mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200             # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)
endstop_pin: tmc2240_stepper_x:virtual_endstop               #PG6 # Limit switch pin setting (X-)
position_min: 0                          # X-axis minimum travel - software limit
position_endstop: 350                    # Mechanical reset point coordinates for X-axis (change to 350 for 350 models)
position_max: 350                        # X-axis maximum travel - software limit (change to 350 for 350 models)
homing_speed: 20                         # Reset speed - maximum 100
homing_retract_dist: 0                   # Setback distance after the first trigger of the reset switch
homing_positive_dir: true                # Direction of reset (generally no change required)


#####################################################################
##                   Y-axis on MOTOR_1（A Motor）
#####################################################################
[tmc2240 stepper_y]
cs_pin: PD11                             # Chip select pin for TMC2240 driver
spi_software_sclk_pin: PA5               # SPI software clock pin
spi_software_mosi_pin: PA7               # SPI software MOSI pin
spi_software_miso_pin: PA6               # SPI software MISO pin
driver_TPFD: 0                           # TMC2240 TPFD setting
run_current: 1.2                         # Motor running current value (A)
diag1_pin: ^!PG9
driver_SGT: -64                          # 255 is most sensitive value, 0 is least sensitive

[stepper_y]
step_pin: PG0                            # Y-axis motor pulse pin setting
dir_pin: PG1                            # Y-axis motor direction pin setting
enable_pin: !PF15                        # Y-axis motor enable pin setting
microsteps: 32                           # Motor microsteps setting
rotation_distance: 40                    # Active pulley circumference in mm (2GT-20T pulley 40, 2GT-16T pulley 32)
full_steps_per_rotation: 200             # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)
endstop_pin: tmc2240_stepper_y:virtual_endstop                         # Limit switch pin setting (Y-)
position_min: 0                          # Y-axis minimum travel - software limit
position_endstop: 350                    # Mechanical reset point coordinates for Y-axis (change to 350 for 350 models)
position_max: 350                        # Y-axis maximum travel - software limit (change to 350 for 350 models)
homing_speed: 20                         # Reset speed - maximum 100
homing_retract_dist: 0                   # Setback distance after the first trigger of the reset switch
homing_positive_dir: true                # Direction of reset (generally no change required)

####################################################################################
#                          z1 -------------- z2
#                          |                 |
#                          |                 |
#                          |                 |
#   |                 |
#                          |                 |
#                          |                 |
#                         z0---   display ---z3
#####################################################################
##                  Z0-axis on MOTOR_2 (left front)
#####################################################################

[stepper_z]
step_pin: PF11    		   # Z-axis motor pulse pin
dir_pin: PG3               # Z-axis motor direction pin setting
enable_pin: !PG5           # Z-axis motor enable pin setting
rotation_distance: 40      # Active pulley circumference mm (2GT-20T pulley 40, 2GT-16T pulley 32)
gear_ratio: 80:16          # reduction ratio
microsteps: 32             # microsteps
endstop_pin: probe:z_virtual_endstop #PG10          # Limit switch interface
##  position_endstop is the distance of the Z limit pin trigger point from the print surface.
##  Positive value = above the termination point of the platform，
##  Negative value = termination point below the plateau.
##  Increasing the value of position_ endstop will bring the nozzle closer to the bed.
##  After running Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the end of the CFG configuration.
##position_endstop: 0.5      # Modified as per actual
position_max: 330               # Maximum Z-axis print height   350mm=340
position_min: -5           # Soft Limit Minimum Stroke
homing_speed: 50           # Reset speed - maximum 20
second_homing_speed: 3     # Secondary reset speed - maximum 10
homing_retract_dist: 0     # Retreat distance

#--------------------------------------------------------------------

[tmc2209 stepper_z]        # TMC2209
uart_pin: PC6              # drive communications port
interpolate: true          # Whether to enable 256 microstep interpolation
run_current: 0.8           # Motor running current value(mA)
hold_current: 0.8          # holding current(mA)
sense_resistor: 0.110      # Do not change the drive sampling resistor
stealthchop_threshold: 200 # Mute threshold

#####################################################################
##                  Z1-axis on MOTOR_3 (left rear)
#####################################################################

[stepper_z1]
step_pin: PG4                            # Z1-axis motor pulse pin setting
dir_pin: !PC1                             # Z1-axis motor direction pin setting
enable_pin: !PA0                         # Z1-axis motor enable pin setting
rotation_distance: 40                    # Active pulley circumference in mm (2GT-20T pulley 40, 2GT-16T pulley 32)
gear_ratio: 80:16                        # Reduction ratio
microsteps: 32                           # Motor microsteps setting

#--------------------------------------------------------------------

[tmc2209 stepper_z1]
uart_pin: PC7                            # UART pin for TMC2209 driver communication
interpolate: true                        # Enable 256 microstep interpolation
run_current: 0.8                         # Motor running current value (A)
hold_current: 0.8                        # Motor holding current value (A)
sense_resistor: 0.110                    # Sense resistor value
stealthchop_threshold: 200               # Mute threshold

#####################################################################
##                  Z2-axis on MOTOR_4 (right rear)
#####################################################################

[stepper_z2]
step_pin: PF9                            # Z2-axis motor pulse pin setting
dir_pin: PF10                           # Z2-axis motor direction pin setting
enable_pin: !PG2                         # Z2-axis motor enable pin setting
rotation_distance: 40                    # Active pulley circumference in mm (2GT-20T pulley 40, 2GT-16T pulley 32)
gear_ratio: 80:16                        # Reduction ratio
microsteps: 32                           # Motor microsteps setting

#--------------------------------------------------------------------

[tmc2209 stepper_z2]
uart_pin: PF2                            # UART pin for TMC2209 driver communication
interpolate: true                        # Enable 256 microstep interpolation
run_current: 0.8                         # Motor running current value (A)
hold_current: 0.8                        # Motor holding current value (A)
sense_resistor: 0.110                    # Sense resistor value
stealthchop_threshold: 200               # Mute threshold

#####################################################################
##                  Z3-axis on MOTOR_5 (right front)
#####################################################################

[stepper_z3]
step_pin: PC13                           # Z3-axis motor pulse pin setting
dir_pin: !PF0                             # Z3-axis motor direction pin setting
enable_pin: !PF1                         # Z3-axis motor enable pin setting
rotation_distance: 40                    # Active pulley circumference in mm (2GT-20T pulley 40, 2GT-16T pulley 32)
gear_ratio: 80:16                        # Reduction ratio
microsteps: 32                           # Motor microsteps setting

#--------------------------------------------------------------------

[tmc2209 stepper_z3]
uart_pin: PE4                            # UART pin for TMC2209 driver communication
interpolate: true                        # Enable 256 microstep interpolation
run_current: 0.8                         # Motor running current value (A)
hold_current: 0.8                        # Motor holding current value (A)
sense_resistor: 0.110                    # Sense resistor value
stealthchop_threshold: 200               # Mute threshold

#####################################################################
##                  Extruder motor
#####################################################################


[extruder]
step_pin: EBB36:PB14              # Step pin
dir_pin: EBB36:PA8               # Direction pin, "!" indicates logic inversion
enable_pin: !EBB36:PB6           # Enable pin, "!" indicates logic inversion
full_steps_per_rotation: 200         # Number of pulses required for a single motor revolution (1.8 degree motor: 200, 0.9 degree motor: 400)
microsteps: 16                       # Microsteps setting
## When calibrating the extruder, update the following value
## Assume you request 100mm feed but get 98mm,
## New value = old value x (actual extruded length / target length)
## 22.6789511 is our recommended value
gear_ratio: 50:10                    # Gear ratio
rotation_distance: 22.719636         # Rotation distance
nozzle_diameter: 0.400               # Nozzle diameter
filament_diameter: 1.750             # Filament diameter
heater_pin: EBB36:PB4             # Heater pin

control: pid                         # Control method
pid_Kp: 24.8                         # Proportional parameter of the PID controller
pid_Ki: 1.778                        # Integral parameter of the PID controller
pid_Kd: 86.489                       # Derivative parameter of the PID controller
min_temp: -20                        # Minimum temperature
max_temp: 350                        # Maximum temperature
min_extrude_temp: 20                # Minimum extrude temperature
max_extrude_only_distance: 500.0
max_extrude_cross_section: 15
pressure_advance: 0.05               # Pressure advance - try to keep pressure below 1.0
pressure_advance_smooth_time: 0.040   # Pressure advance smooth time - default is 0.040
## Nozzle temperature PID calibration command: "PID_CALIBRATE HEATER=extruder TARGET=245"
sensor_type: EPCOS 100K B57560G104F                # Temperature sensor type
sensor_pin: EBB36:PA3             # Sensor pin
# spi_software_sclk_pin: EBB36:gpio10 # SPI clock pin
# spi_software_mosi_pin: EBB36:gpio8  # SPI master out slave in pin
# spi_software_miso_pin: EBB36:gpio11 # SPI master in slave out pin
# rtd_nominal_r: 100                   # RTD nominal resistance
# rtd_reference_r: 430                 # RTD reference resistance
# rtd_num_of_wires: 2                  # Number of wires for the RTD

#--------------------------------------------------------------------
[tmc2209 extruder]
uart_pin: EBB36:PB3
run_current: 0.650
stealthchop_threshold: 999999
#--------------------------------------------------------------------
[verify_heater extruder]             # Heater block temperature tolerance configuration
max_error: 120                       # Maximum error
check_gain_time: 120                 # Tolerance time
hysteresis: 50                       # Tolerance temperature
heating_gain: 2                      # Heating gain


#####################################################################
##                  Heater_bed
#####################################################################

[heater_bed]
heater_pin: PA3                          # (HE1)
sensor_pin: PF3                          # sensor interface(TB)
sensor_type: ATC Semitec 104GT-2	     # ATC Semitec 104GT-2
min_temp: 0                              # Minimum temperature threshold
max_temp: 120                            # Maximum temperature threshold
max_power: 1.0                           # Maximum power for the heater or fan

#--------------------------------------------------------------------

[idle_timeout]
timeout: 54000                           # Time in seconds (1h30 minutes) before turning off the hot bed if idle
	

#####################################################################
#                  FAN
#####################################################################

[multi_pin PCF_pins]
pins: EBB36:PD3, EBB36:PA5

[fan]                                    # Parts Cooling Fan 
pin: PCF_pins                       # Pin for general fan control
kick_start_time: 0.5                     # Time to start the fan
off_below: 0.10                          # Temperature below which the fan turns off

#--------------------------------------------------------------------

[heater_fan hotend_fan]                  # hotend fan
pin: EBB36:PD2                           # Pin for hotend fan control
heater: extruder                         # Heater associated with this fan
heater_temp: 50.0                        # Temperature at which the fan activates


#--------------------------------------------------------------------

[controller_fan electronics_fan_1]
pin: PA8
fan_speed: 0.6
kick_start_time: 0
stepper: stepper_x

#--------------------------------------------------------------------

[controller_fan electronics_fan_2]
pin: PE5
fan_speed: 0.6
shutdown_speed: 0.0
kick_start_time: 0.5
stepper: stepper_x

#--------------------------------------------------------------------

[controller_fan electronics_fan_3]
pin: PD12
fan_speed: 0.6
shutdown_speed: 0.0
kick_start_time: 0.5
stepper: stepper_x

#--------------------------------------------------------------------

[fan_generic Nevermore]                   # Nevermore V6
pin: PD13                                 # Pin for Nevermore fan control
max_power: 1.0                            # Maximum power for the fan
shutdown_speed: 1.0                       # Speed at which the fan shuts down
kick_start_time: 5.0                      # Start-up time for the fan
# heater: extruder                         # Heater associated with this fan
# heater_temp: 200                         # Temperature at which the fan activates
# fan_speed: 1.0                           # Fan speed

#--------------------------------------------------------------------

[controller_fan AB_steppers_fan]
pin: PD14
fan_speed: 0.95
shutdown_speed: 0.0
kick_start_time: 0.5
stepper: stepper_x

#####################################################################
##                     RGB LED Light Settings
#####################################################################

[neopixel hotend_rgb]                    # Stealthburner LED
pin: EBB36:PC7                       # Pin for hotend RGB LED control
chain_count: 3                           # Number of LED beads in the chain
color_order: GRBW                        # Color order for RGBW LEDs
initial_RED: 0.9                         # Initial red brightness
initial_GREEN: 0.9                       # Initial green brightness
initial_BLUE: 0.9                        # Initial blue brightness

#--------------------------------------------------------------------

